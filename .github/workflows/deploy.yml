name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # VPS 배포
      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/ai-playbook"
          rm: true
          overwrite: true

      - name: Restart MCP server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/ai-playbook/mcp-server
            export PLAYBOOK_API_KEY="${{ secrets.PLAYBOOK_API_KEY }}"
            pm2 delete ai-playbook-server 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
            sleep 2
            curl -f http://localhost:3100/health || echo "Health check failed"

      # npm publish (mcp-client)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish mcp-client
        working-directory: mcp-client
        run: npm publish --access public || echo "Already published (same version)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
